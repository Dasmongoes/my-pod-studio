kind = "mobile"
previewPath = "/printflow-mobile/"
title = "BincoHub Mobile"
version = "1.0.0"
id = "artifacts/printflow-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/printflow-mobile/" ]
localPort = 20854

[services.development]
run = "pnpm --filter @workspace/printflow-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/printflow-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/printflow-mobile", "run", "serve" ]

[services.env]
PORT = "20854"
BASE_PATH = "/printflow-mobile/"
